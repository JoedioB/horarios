version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: horarios_postgres
    restart: always
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: user_horarios
      POSTGRES_PASSWORD: user_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: horarios_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MYSQLHOST=db
      - MYSQLPORT=5432
      - MYSQLUSER=user_horarios
      - MYSQLPASSWORD=user_password
      - MYSQLDATABASE=horarios_db
      - NODE_ENV=development
    depends_on:
      - db

volumes:
  postgres_data:
